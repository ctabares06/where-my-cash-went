# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Deploy Prod

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY_BASE: 570962435611.dkr.ecr.us-east-2.amazonaws.com
  ECS_CLUSTER: wmcw-cluster
  TASK_DEFINITION_FAMILY: where-my-cash-went
  AWS_ROLE: arn:aws:iam::570962435611:role/GitHubActionsRole

permissions:
  id-token: write
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm lint

  login-and-deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: deploy-dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NODE_ENV=production \
            -f Dockerfile.prod \
            -t $ECR_REGISTRY/where-my-cash-went-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/where-my-cash-went-api:latest \
            .
          docker push $ECR_REGISTRY/where-my-cash-went-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/where-my-cash-went-api:latest

      - name: Build and push Nginx image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f nginx.dockerfile \
            -t $ECR_REGISTRY/where-my-cash-went-nginx:$IMAGE_TAG \
            -t $ECR_REGISTRY/where-my-cash-went-nginx:latest \
            .
          docker push $ECR_REGISTRY/where-my-cash-went-nginx:$IMAGE_TAG
          docker push $ECR_REGISTRY/where-my-cash-went-nginx:latest

      - name: Stop running ECS tasks
        run: |
          TASKS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --region ${{ env.AWS_REGION }} \
            --output json | jq -r '.taskArns[]')
          for task in $TASKS; do
            aws ecs stop-task \
              --cluster ${{ env.ECS_CLUSTER }} \
              --task $task \
              --region ${{ env.AWS_REGION }}
          done

      - name: Run new ECS task
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --region ${{ env.AWS_REGION }}
