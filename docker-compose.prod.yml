services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    command: ['pnpm', 'start:prod']
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '--fail',
          'http://app:3000/health',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

  nginx:
    image: nginx:1.29-trixie
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '--fail',
          'http://localhost:80/health',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
